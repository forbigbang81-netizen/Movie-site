<!DOCTYPE html>
<html lang="en">
<head>
    <title>StreamPro Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-brand">STREAMPRO</div>
        <div class="nav-links">
            <button onclick="showPage('home')">Home</button>
            <button onclick="showPage('dashboard')">History</button>
        </div>
    </header>

    <div id="playerPage" class="page">
        <div id="playerContainer">
            <iframe id="mainFrame" src="" allowfullscreen></iframe>
        </div>

        <div class="server-switcher">
            <button id="btn-vidking" class="srv-btn active" onclick="toggleServer('vidking')">Server 1 (Vidking)</button>
            <button id="btn-vidsrc" class="srv-btn" onclick="toggleServer('vidsrc')">Server 2 (Vidsrc)</button>
        </div>

        <div class="save-panel">
            <input type="text" id="timeInput" placeholder="Enter Timestamp...">
            <button id="saveBtn" onclick="manualSave()">SAVE PROGRESS</button>
        </div>
        
        <div id="tvControls"></div>
    </div>

    <script src="logic.js"></script>
</body>
</html>
