<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamPro Elite | Ultra</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --accent: #e50914;
            --accent-glow: rgba(229, 9, 20, 0.5);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(20, 20, 20, 0.8);
        }

        /* Smooth Scroll & Base */
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Advanced Glass Header */
        header {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 5%;
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        header.scrolled { padding: 10px 5%; background: #000; }

        .header-container { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        
        .nav-brand {
            font-size: 24px; font-weight: 900; color: var(--accent);
            text-transform: uppercase; letter-spacing: -1px; cursor: pointer;
            transition: transform 0.3s ease;
        }
        .nav-brand:hover { transform: scale(1.05); text-shadow: 0 0 15px var(--accent-glow); }

        .search-box { flex-grow: 1; max-width: 400px; position: relative; }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 10px 15px; border-radius: 8px; font-size: 14px;
            transition: all 0.3s ease;
        }
        .search-box input:focus {
            background: rgba(255,255,255,0.1); border-color: var(--accent);
            box-shadow: 0 0 15px rgba(229,9,20,0.2); outline: none;
        }

        /* Page Layout & Animations */
        .page { 
            display: none; padding: 100px 5% 50px; 
            opacity: 0; transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        /* Cinematic Movie Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px; margin-top: 30px;
        }

        .movie-card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 2/3;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .movie-card:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .movie-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .movie-card:hover img { transform: scale(1.1); }

        .progress-tag {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(to top, var(--accent), transparent);
            font-size: 11px; padding: 15px 0 8px; text-align: center;
            font-weight: 800; text-transform: uppercase;
        }

        /* Enhanced Player UI */
        .player-wrapper {
            max-width: 1200px; margin: 0 auto;
            animation: slideUp 0.6s ease-out;
        }

        .player-frame-container {
            width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 16px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .srv-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 10px 20px; border-radius: 30px;
            cursor: pointer; font-size: 12px; font-weight: 700;
            transition: all 0.3s ease; margin-right: 10px;
        }
        .srv-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .srv-btn:hover:not(.active) { background: rgba(255,255,255,0.15); }

        /* Episode Grid Redesign */
        .ep-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px; margin-top: 20px;
        }
        .ep-node {
            background: var(--surface); padding: 15px 0; border-radius: 10px;
            text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s ease; font-weight: bold;
        }
        .ep-node:hover { background: #252525; border-color: var(--accent); transform: translateY(-3px); }
        .ep-node.active { background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive Fixes */
        @media (max-width: 600px) {
            .card-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<header id="mainHeader">
    <div class="header-container">
        <div class="nav-brand" onclick="showPage('home')">STREAMPRO</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search movies or shows..." oninput="handleSearch(this.value)">
        </div>
        <nav class="nav-links">
            <button class="srv-btn" onclick="showPage('dashboard')">History</button>
        </nav>
    </div>
</header>

<div id="home" class="page active">
    <h1 style="font-size: 32px; letter-spacing: -1px;">Trending Now</h1>
    <div id="trendingGrid" class="card-grid"></div>
</div>

<div id="dashboard" class="page">
    <h1>Continue Watching</h1>
    <div id="continueGrid" class="card-grid"></div>
</div>

<div id="playerPage" class="page">
    <div class="player-wrapper">
        <div class="player-frame-container">
            <iframe id="mainFrame" src="" allowfullscreen allow="autoplay"></iframe>
        </div>
        
        <div style="margin-top: 25px;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h2 id="playerMeta" style="margin:0; font-size: 28px;">Loading...</h2>
                    <p id="saveMsg" style="color: #2ecc71; font-size: 12px; font-weight: bold; opacity:0; transition:0.3s;">✓ AUTO-SAVED TO CLOUD</p>
                </div>
                <div class="server-selector">
                    <button id="btn-vidking" class="srv-btn active" onclick="toggleServer('vidking')">SERVER 1</button>
                    <button id="btn-vidsrc" class="srv-btn" onclick="toggleServer('vidsrc')">SERVER 2</button>
                </div>
            </div>

            <div id="tvControls" style="display:none; margin-top: 30px;">
                <select id="seasonSelect" style="width:100%; padding:15px; background:var(--surface); color:white; border:1px solid #333; border-radius:10px; font-weight:bold;" onchange="loadSeason()"></select>
                <div class="ep-grid" id="epGrid"></div>
            </div>
        </div>
    </div>

    <h2 style="margin-top: 50px; opacity:0.5;">Recommendations</h2>
    <div id="similarGrid" class="card-grid"></div>
</div>

<script>
    const API_KEY = 'c030ba389534870868d461b8a5812f62';
    const STORAGE_KEY = 'ELITE_STREAM_DATA';
    let cur = { id: '', type: '', s: 1, e: 1, title: '', poster: '', server: 'vidking' };

    // Scroll Effect
    window.addEventListener('scroll', () => {
        const header = document.getElementById('mainHeader');
        if(window.scrollY > 20) header.classList.add('scrolled');
        else header.classList.remove('scrolled');
    });

    window.onload = () => { fetchTrending(); renderHistory(); };

    function showPage(id) {
        const pages = document.querySelectorAll('.page');
        pages.forEach(p => p.classList.remove('active'));
        setTimeout(() => {
            document.getElementById(id).classList.add('active');
        }, 50);
        if(id === 'dashboard') renderHistory();
        window.scrollTo(0,0);
    }

    async function startApp(id, type, title, poster) {
        cur = { id, type, title, poster, s: 1, e: 1, server: 'vidking' };
        
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        if(history[id]) { cur.s = history[id].s; cur.e = history[id].e; }

        showPage('playerPage');
        updateVideo();
        
        if(type === 'tv') {
            document.getElementById('tvControls').style.display = 'block';
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`).then(r => r.json());
            document.getElementById('seasonSelect').innerHTML = res.seasons.filter(s => s.season_number > 0)
                .map(s => `<option value="${s.season_number}" ${s.season_number == cur.s ? 'selected' : ''}>Season ${s.season_number}</option>`).join('');
            loadSeason(true);
        } else {
            document.getElementById('tvControls').style.display = 'none';
        }
        fetchSimilar(id, type);
    }

    function updateVideo() {
        const base = cur.server === 'vidking' ? 'https://vidking.bio/embed/' : 'https://vidsrc.xyz/embed/';
        const path = cur.type === 'tv' ? `${cur.id}/${cur.s}${cur.server === 'vidking' ? '/' : '-'}${cur.e}` : cur.id;
        document.getElementById('mainFrame').src = `${base}${cur.type}/${path}`;
        document.getElementById('playerMeta').innerText = cur.title + (cur.type === 'tv' ? ` • S${cur.s} E${cur.e}` : '');
        
        // Auto-save feedback
        const msg = document.getElementById('saveMsg');
        msg.style.opacity = '1';
        saveToStorage();
        setTimeout(() => msg.style.opacity = '0', 2000);
    }

    function toggleServer(srv) {
        cur.server = srv;
        document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${srv}`).classList.add('active');
        updateVideo();
    }

    async function loadSeason(init = false) {
        cur.s = document.getElementById('seasonSelect').value;
        const r = await fetch(`https://api.themoviedb.org/3/tv/${cur.id}/season/${cur.s}?api_key=${API_KEY}`).then(res => res.json());
        const grid = document.getElementById('epGrid');
        grid.innerHTML = '';
        r.episodes.forEach(ep => {
            const div = document.createElement('div');
            div.className = `ep-node ${ep.episode_number == cur.e ? 'active' : ''}`;
            div.innerText = ep.episode_number;
            div.onclick = () => { cur.e = ep.episode_number; updateVideo(); loadSeason(true); };
            grid.appendChild(div);
        });
        if(!init) { cur.e = 1; updateVideo(); }
    }

    function saveToStorage() {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        data[cur.id] = { ...cur, stamp: Date.now() };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function renderHistory() {
        const grid = document.getElementById('continueGrid');
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const items = Object.values(data).sort((a,b) => b.stamp - a.stamp);
        grid.innerHTML = items.length ? '' : '<p style="color:#666;">No history found.</p>';
        items.forEach(m => grid.appendChild(createCard(m, true)));
    }

    function fetchTrending() {
        fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`)
            .then(r => r.json()).then(d => renderGrid(d.results, 'trendingGrid'));
    }

    async function handleSearch(q) {
        if(q.length < 2) return;
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`).then(r => r.json());
        renderGrid(res.results.filter(i => i.poster_path), 'trendingGrid');
    }

    async function fetchSimilar(id, type) {
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}/similar?api_key=${API_KEY}`).then(r => r.json());
        renderGrid(res.results.slice(0, 10), 'similarGrid');
    }

    function renderGrid(data, target) {
        const g = document.getElementById(target); g.innerHTML = '';
        data.forEach(m => g.appendChild(createCard(m)));
    }

    function createCard(m, isHistory = false) {
        const card = document.createElement('div');
        card.className = 'movie-card';
        const type = m.media_type || m.type || (m.title ? 'movie' : 'tv');
        const poster = m.poster_path || m.poster;
        card.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${poster}" loading="lazy">`;
        if(isHistory) card.innerHTML += `<div class="progress-tag">${m.type==='tv'?'S'+m.s+':E'+m.e:'Resume'}</div>`;
        card.onclick = () => startApp(m.id, type, m.title || m.name, poster);
        return card;
    }
</script>
</body>
</html>
