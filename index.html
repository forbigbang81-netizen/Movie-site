<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamPro Elite</title>
    <style>
        :root { --bg: #000000; --card: #141414; --accent: #e50914; --filler: #ff9800; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        header { background: #000; padding: 10px 5%; display: flex; flex-direction: column; gap: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .nav-brand { font-weight: 900; font-size: 24px; color: var(--accent); cursor: pointer; }
        
        .search-container { position: relative; width: 100%; }
        #searchInput { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        
        #searchDropdown { position: absolute; top: 100%; left: 0; width: 100%; background: #111; border: 1px solid #333; max-height: 400px; overflow-y: auto; display: none; z-index: 2000; border-radius: 0 0 6px 6px; }
        .search-item { padding: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #1a1a1a; }

        .genre-row { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .genre-row::-webkit-scrollbar { display: none; }
        .genre-pill { white-space: nowrap; padding: 6px 14px; background: #222; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid #333; }
        .genre-pill:hover { background: var(--accent); border-color: var(--accent); }

        .page { display: none; padding: 20px 5%; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #playerContainer { width: 100%; max-width: 1000px; margin: 0 auto; background: #000; border-radius: 8px; overflow: hidden; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top:0; left:0; width: 100%; height: 100%; border: none; }

        .skip-bar { display: flex; gap: 8px; margin: 15px 0; justify-content: center; }
        .skip-btn { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .movie-card { background: var(--card); border-radius: 4px; position: relative; cursor: pointer; overflow: hidden; aspect-ratio: 2/3; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .progress-tag { position: absolute; bottom: 0; width: 100%; background: var(--accent); font-size: 10px; padding: 4px; text-align: center; font-weight: bold; }

        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 8px; margin-top: 15px; }
        .ep-node { background: #222; padding: 12px 0; text-align: center; cursor: pointer; border-radius: 4px; position: relative; font-size: 12px; }
        .ep-node.filler { border: 1px solid var(--filler); color: var(--filler); }
        .ep-node.active { background: var(--accent); color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <div class="nav-brand" onclick="location.reload()">STREAMPRO</div>
        <div style="display:flex; gap:15px; font-size: 14px;">
            <span onclick="showPage('home')" style="cursor:pointer;">Home</span>
            <span onclick="showPage('dashboard')" style="cursor:pointer;">History</span>
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search anime, movies, or genres..." oninput="handleSearch(this.value)">
        <div id="searchDropdown"></div>
    </div>
    <div class="genre-row" id="genreBar"></div>
</header>

<div id="home" class="page active">
    <h2 id="homeTitle">Trending Now</h2>
    <div id="trendingGrid" class="card-grid"></div>
</div>

<div id="dashboard" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Continue Watching</h2>
        <button onclick="clearHistory()" style="background:transparent; color:#666; border:none; font-size:12px;">Clear All</button>
    </div>
    <div id="continueGrid" class="card-grid"></div>
</div>

<div id="playerPage" class="page">
    <div id="playerContainer">
        <div class="video-wrapper">
            <iframe id="mainFrame" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

    <div class="skip-bar">
        <button class="skip-btn" onclick="jump(85)">⏭ SKIP INTRO</button>
        <button class="skip-btn" onclick="jump(90)">⏭ SKIP OUTRO</button>
    </div>

    <div id="tvControls" style="display:none;">
        <h3 id="playerMeta" style="margin:10px 0; font-size:16px;"></h3>
        <select id="seasonSelect" style="width:100%; padding:12px; background:#111; color:white; border:1px solid #333;" onchange="loadSeason()"></select>
        <div id="epGrid" class="ep-grid"></div>
    </div>
</div>

<script>
    const API_KEY = 'c030ba389534870868d461b8a5812f62';
    const DB_KEY = 'STREAMPRO_HISTORY_PERM'; // Permanent Storage Key
    const GENRES = [{id: 16, name: "Anime"}, {id: 28, name: "Action"}, {id: 27, name: "Horror"}, {id: 878, name: "Sci-Fi"}, {id: 35, name: "Comedy"}];
    let cur = { id: '', type: '', s: 1, e: 1, title: '', poster: '' };

    // Initialize Categories
    const genreBar = document.getElementById('genreBar');
    GENRES.forEach(g => {
        const span = document.createElement('span');
        span.className = 'genre-pill';
        span.innerText = g.name;
        span.onclick = () => loadGenre(g.id, g.name);
        genreBar.appendChild(span);
    });

    // CRITICAL: Load history immediately on page load
    window.onload = () => {
        renderDashboard(); 
        fetchTrending();
    };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'dashboard') renderDashboard();
    }

    async function handleSearch(query) {
        const dropdown = document.getElementById('searchDropdown');
        if (query.length < 2) { dropdown.style.display = 'none'; return; }
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${query}`);
        const data = await res.json();
        dropdown.innerHTML = '';
        if (data.results) {
            dropdown.style.display = 'block';
            data.results.slice(0, 6).forEach(item => {
                if(!item.poster_path) return;
                const div = document.createElement('div');
                div.className = 'search-item';
                div.onclick = () => { startApp(item.id, item.media_type || 'tv', item.title || item.name, item.poster_path); dropdown.style.display = 'none'; };
                div.innerHTML = `<img src="https://image.tmdb.org/t/p/w92${item.poster_path}" style="width:35px; height:50px; object-fit:cover;"><span>${item.title || item.name}</span>`;
                dropdown.appendChild(div);
            });
        }
    }

    async function startApp(id, type, title, poster) {
        cur = { id, type, title, poster, s: 1, e: 1 };
        
        // Load existing history from storage
        const hist = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        if(hist[id]) { cur.s = hist[id].s; cur.e = hist[id].e; }

        if(type === 'tv' || id === 16) {
            document.getElementById('tvControls').style.display = 'block';
            const r = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`).then(res => res.json());
            document.getElementById('seasonSelect').innerHTML = r.seasons.filter(s => s.season_number > 0)
                .map(s => `<option value="${s.season_number}" ${s.season_number == cur.s ? 'selected' : ''}>Season ${s.season_number}</option>`).join('');
            loadSeason(true);
        } else {
            document.getElementById('tvControls').style.display = 'none';
            updateFrame();
        }
        showPage('playerPage');
    }

    async function loadSeason(init = false) {
        cur.s = document.getElementById('seasonSelect').value;
        const r = await fetch(`https://api.themoviedb.org/3/tv/${cur.id}/season/${cur.s}?api_key=${API_KEY}`).then(res => res.json());
        const grid = document.getElementById('epGrid');
        grid.innerHTML = '';
        r.episodes.forEach(ep => {
            const div = document.createElement('div');
            div.className = `ep-node ${ep.episode_number == cur.e ? 'active' : ''}`;
            div.innerText = ep.episode_number;
            div.onclick = () => { cur.e = ep.episode_number; updateFrame(); };
            grid.appendChild(div);
        });
        if(!init) cur.e = 1;
        updateFrame();
    }

    function updateFrame() {
        document.getElementById('mainFrame').src = `https://vidsrc.cc/v2/embed/${cur.type}/${cur.id}${cur.type==='tv' ? `/${cur.s}/${cur.e}` : ''}`;
        document.getElementById('playerMeta').innerText = `${cur.title} - S${cur.s} E${cur.e}`;
        
        // SAVE TO LOCALSTORAGE
        const hist = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        hist[cur.id] = { ...cur, stamp: Date.now() };
        localStorage.setItem(DB_KEY, JSON.stringify(hist));
    }

    function renderDashboard() {
        const grid = document.getElementById('continueGrid');
        grid.innerHTML = '';
        const data = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        const items = Object.values(data).sort((a,b) => b.stamp - a.stamp);
        
        if (items.length === 0) {
            grid.innerHTML = '<p style="color:#666; font-size:12px;">No history yet.</p>';
            return;
        }

        items.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => startApp(m.id, m.type, m.title, m.poster);
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster}"><div class="progress-tag">${m.type==='tv' ? `S${m.s}:E${m.e}` : 'RESUME'}</div>`;
            grid.appendChild(card);
        });
    }

    function jump(s) {
        const frame = document.getElementById('mainFrame');
        const connector = frame.src.includes('?') ? '&' : '?';
        frame.src += `${connector}t=${s}s`;
    }

    function fetchTrending() {
        fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`).then(r => r.json()).then(d => {
            renderGrid('trendingGrid', d.results);
        });
    }

    function renderGrid(targetId, results, forceType = null) {
        const grid = document.getElementById(targetId);
        grid.innerHTML = '';
        results.forEach(m => {
            if(!m.poster_path) return;
            const card = document.createElement('div');
            card.className = 'movie-card';
            const type = forceType || m.media_type || 'movie';
            card.onclick = () => startApp(m.id, type, m.title || m.name, m.poster_path);
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">`;
            grid.appendChild(card);
        });
    }

    async function loadGenre(id, name) {
        document.getElementById('homeTitle').innerText = `${name} Collection`;
        const type = (id === 16) ? 'tv' : 'movie';
        const res = await fetch(`https://api.themoviedb.org/3/discover/${type}?api_key=${API_KEY}&with_genres=${id}&sort_by=popularity.desc`);
        const data = await res.json();
        renderGrid('trendingGrid', data.results, type);
        showPage('home');
    }

    function clearHistory() {
        if(confirm("Clear your watch history?")) {
            localStorage.removeItem(DB_KEY);
            renderDashboard();
        }
    }
</script>
</body>
</html>
