<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamPro Elite</title>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #e50914; --text: #fff; --success: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 50px; }
        
        header { background: #000; padding: 15px 5%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .nav-brand { font-weight: 900; font-size: 22px; color: var(--accent); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; font-size: 15px; font-weight: 600; }

        .page { display: none; padding: 0 5%; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #playerContainer { width: 100%; background: #000; aspect-ratio: 16/9; position: relative; }
        #mainFrame { width: 100%; height: 100%; border: none; }

        /* Save Panel */
        .save-panel { background: #111; padding: 15px; border-radius: 8px; margin: 15px 5%; border: 1px solid #222; }
        .timestamp-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .time-input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; outline: none; }
        
        .btn-save { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-save:active { transform: scale(0.98); background: #b00710; }
        .btn-save.saved { background: var(--success); }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-top: 10px; }
        .movie-card { background: var(--card); border-radius: 6px; position: relative; overflow: hidden; aspect-ratio: 2/3; cursor: pointer; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .progress-tag { position: absolute; bottom: 0; width: 100%; background: var(--accent); font-size: 10px; padding: 4px 0; text-align: center; font-weight: 800; }
        .time-tag { background: rgba(0,0,0,0.8); color: #aaa; font-size: 9px; display: block; margin-top: 2px; }

        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 8px; margin: 15px 0; }
        .ep-node { background: #222; padding: 12px 0; text-align: center; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .ep-node.active { background: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="#" class="nav-brand" onclick="location.reload()">STREAMPRO</a>
    <div class="nav-links">
        <span onclick="showPage('home')">Home</span>
        <span onclick="showPage('dashboard')">History</span>
    </div>
</header>

<div id="home" class="page active">
    <h2 style="font-size: 20px;">Trending Now</h2>
    <div id="trendingGrid" class="card-grid"></div>
</div>

<div id="dashboard" class="page">
    <h2 style="font-size: 20px;">Continue Watching</h2>
    <div id="continueGrid" class="card-grid"></div>
</div>

<div id="playerPage" class="page">
    <div id="playerContainer">
        <iframe id="mainFrame" src="" allowfullscreen allow="autoplay"></iframe>
    </div>

    <div class="save-panel">
        <h3 id="playerMeta" style="margin: 0 0 10px 0; font-size: 18px;"></h3>
        
        <div class="timestamp-row">
            <input type="text" id="timeInput" class="time-input" placeholder="Enter Timestamp (e.g. 1:20:05)">
        </div>
        <button id="saveBtn" class="btn-save" onclick="manualSave()">SAVE PROGRESS</button>
        
        <div id="tvControls" style="display:none; margin-top: 15px;">
            <select id="seasonSelect" style="width:100%; padding:10px; background:#222; color:white; border:1px solid #444;" onchange="loadSeason()"></select>
            <div class="ep-grid" id="epGrid"></div>
        </div>
    </div>

    <div style="padding: 0 5%;">
        <h3 style="border-left: 4px solid var(--accent); padding-left: 10px;">More Like This</h3>
        <div id="similarGrid" class="card-grid"></div>
    </div>
</div>

<script>
    const API_KEY = 'c030ba389534870868d461b8a5812f62';
    const DB_KEY = 'STREAMPRO_V30_TIMESTAMP'; 
    
    let cur = { id: '', type: '', s: 1, e: 1, title: '', poster: '', time: '' };

    window.onload = () => { renderDashboard(); fetchTrending(); };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'dashboard') renderDashboard();
    }

    async function startApp(id, type, title, poster) {
        showPage('playerPage');
        window.scrollTo(0,0);
        
        cur = { id, type, title, poster, s: 1, e: 1, time: '' };
        
        const hist = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        if(hist[id]) { 
            cur.s = hist[id].s || 1; 
            cur.e = hist[id].e || 1; 
            cur.time = hist[id].time || '';
        }

        document.getElementById('timeInput').value = cur.time;
        document.getElementById('playerMeta').innerText = title;
        document.getElementById('saveBtn').classList.remove('saved');
        document.getElementById('saveBtn').innerText = "SAVE PROGRESS";

        if(type === 'tv') {
            document.getElementById('tvControls').style.display = 'block';
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`).then(r => r.json());
            document.getElementById('seasonSelect').innerHTML = res.seasons.filter(s => s.season_number > 0)
                .map(s => `<option value="${s.season_number}" ${s.season_number == cur.s ? 'selected' : ''}>Season ${s.season_number}</option>`).join('');
            loadSeason(true);
        } else {
            document.getElementById('tvControls').style.display = 'none';
            updateVideo();
        }
        
        fetchSimilar(id, type);
    }

    async function loadSeason(init = false) {
        cur.s = document.getElementById('seasonSelect').value;
        const r = await fetch(`https://api.themoviedb.org/3/tv/${cur.id}/season/${cur.s}?api_key=${API_KEY}`).then(res => res.json());
        const grid = document.getElementById('epGrid');
        grid.innerHTML = '';
        
        r.episodes.forEach(ep => {
            const div = document.createElement('div');
            div.className = `ep-node ${ep.episode_number == cur.e ? 'active' : ''}`;
            div.innerText = ep.episode_number;
            div.onclick = () => { 
                cur.e = ep.episode_number; 
                updateVideo(); 
                loadSeason(true);
            };
            grid.appendChild(div);
        });
        
        if(!init) cur.e = 1;
        updateVideo();
    }

    function updateVideo() {
        const url = `https://vidsrc.xyz/embed/${cur.type}/${cur.id}${cur.type === 'tv' ? `/${cur.s}-${cur.e}` : ''}`;
        document.getElementById('mainFrame').src = url;
        document.getElementById('playerMeta').innerText = cur.title + (cur.type === 'tv' ? ` (S${cur.s}:E${cur.e})` : '');
    }

    function manualSave() {
        cur.time = document.getElementById('timeInput').value;
        
        const hist = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        hist[cur.id] = { ...cur, stamp: Date.now() };
        localStorage.setItem(DB_KEY, JSON.stringify(hist));

        const btn = document.getElementById('saveBtn');
        btn.innerText = "✓ SAVED TO STORAGE";
        btn.classList.add('saved');
        
        setTimeout(() => {
            btn.classList.remove('saved');
            btn.innerText = "SAVE PROGRESS";
        }, 3000);
    }

    async function fetchSimilar(id, type) {
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}/similar?api_key=${API_KEY}`).then(r => r.json());
        const grid = document.getElementById('similarGrid');
        grid.innerHTML = '';
        res.results.slice(0, 8).forEach(m => {
            const c = document.createElement('div');
            c.className = 'movie-card';
            c.onclick = () => startApp(m.id, type, m.title || m.name, m.poster_path);
            c.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">`;
            grid.appendChild(c);
        });
    }

    function renderDashboard() {
        const grid = document.getElementById('continueGrid');
        const data = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        const items = Object.values(data).sort((a,b) => b.stamp - a.stamp);
        grid.innerHTML = items.length ? '' : '<p style="color:#666;">No history.</p>';
        items.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => startApp(m.id, m.type, m.title, m.poster);
            card.innerHTML = `
                <img src="https://image.tmdb.org/t/p/w342${m.poster}">
                <div class="progress-tag">
                    ${m.type==='tv' ? `S${m.s}:E${m.e}` : 'RESUME'}
                    <span class="time-tag">${m.time ? '@ ' + m.time : ''}</span>
                </div>`;
            grid.appendChild(card);
        });
    }

    function fetchTrending() { 
        fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`).then(r=>r.json()).then(d=>renderGrid(d.results)); 
    }
    
    function renderGrid(res) {
        const g = document.getElementById('trendingGrid'); g.innerHTML = '';
        res.forEach(m => {
            if(!m.poster_path) return;
            const c = document.createElement('div');
            c.className = 'movie-card';
            c.onclick = () => startApp(m.id, m.media_type || 'movie', m.title || m.name, m.poster_path);
            c.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">`;
            g.appendChild(c);
        });
    }
</script>
</body>
</html>
