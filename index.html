<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamPro Elite | Clean Stream</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --accent: #e50914;
            --accent-glow: rgba(229, 9, 20, 0.4);
            --text: #ffffff;
            --glass: rgba(10, 10, 10, 0.9);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Fixed Elite Header */
        header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 12px 5%;
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand { font-size: 22px; font-weight: 900; color: var(--accent); cursor: pointer; text-transform: uppercase; }
        .nav-links { display: flex; gap: 15px; }
        .nav-item { font-size: 14px; font-weight: 600; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .nav-item:hover { opacity: 1; color: var(--accent); }

        /* Search & Genre Section */
        .top-controls { padding: 80px 5% 10px; }
        .search-input {
            width: 100%; background: #1a1a1a; border: 1px solid #333;
            color: #fff; padding: 12px 15px; border-radius: 12px;
            font-size: 14px; outline: none; transition: 0.3s;
            margin-bottom: 15px;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .genre-bar { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .genre-bar::-webkit-scrollbar { display: none; }
        .pill {
            background: #1a1a1a; border: 1px solid #333; padding: 8px 20px;
            border-radius: 25px; font-size: 13px; font-weight: 700; cursor: pointer;
            white-space: nowrap; transition: 0.3s;
        }
        .pill.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 4px 12px var(--accent-glow); }

        /* Content Pages */
        .page { display: none; padding: 10px 5% 50px; animation: fadeInUp 0.5s ease forwards; }
        .page.active { display: block; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Movie Cards */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .movie-card {
            background: var(--surface); border-radius: 12px; overflow: hidden;
            aspect-ratio: 2/3; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .movie-card:hover { transform: scale(1.05); z-index: 5; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Advanced Player Area */
        .player-wrapper {
            width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 16px; overflow: hidden; border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        iframe { width: 100%; height: 100%; border: none; }

        .server-toggle { display: flex; gap: 10px; margin: 20px 0; }
        .srv-btn {
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: #1a1a1a; color: #fff; font-weight: 800; cursor: pointer;
            transition: 0.3s; font-size: 13px;
        }
        .srv-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* Episode Grid */
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; margin-top: 20px; }
        .ep-node {
            background: #1a1a1a; padding: 12px 0; text-align: center;
            border-radius: 8px; cursor: pointer; border: 1px solid #333;
            font-weight: 800; transition: 0.2s;
        }
        .ep-node.active { background: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="nav-brand" onclick="showPage('home')">STREAMPRO</div>
    <div class="nav-links">
        <div class="nav-item" onclick="showPage('home')">Browse</div>
        <div class="nav-item" onclick="showPage('dashboard')">History</div>
    </div>
</header>

<div class="top-controls">
    <input type="text" class="search-input" placeholder="Search for movies or shows..." oninput="handleSearch(this.value)">
    <div class="genre-bar">
        <div class="pill active" onclick="filterGenre('all', this)">Trending</div>
        <div class="pill" onclick="filterGenre('16', this)">Anime</div>
        <div class="pill" onclick="filterGenre('28', this)">Action</div>
        <div class="pill" onclick="filterGenre('27', this)">Horror</div>
        <div class="pill" onclick="filterGenre('878', this)">Sci-Fi</div>
    </div>
</div>

<div id="home" class="page active">
    <div id="trendingGrid" class="card-grid"></div>
</div>

<div id="dashboard" class="page">
    <h2 style="margin-top:0">Jump Back In</h2>
    <div id="continueGrid" class="card-grid"></div>
</div>

<div id="playerPage" class="page">
    <div class="player-wrapper">
        <iframe id="mainFrame" src="" allowfullscreen></iframe>
    </div>
    
    <div class="server-toggle">
        <button id="srv1" class="srv-btn active" onclick="setServer('vidsrc')">SERVER 1 (High Quality)</button>
        <button id="srv2" class="srv-btn" onclick="setServer('superembed')">SERVER 2 (Less Ads)</button>
    </div>

    <h2 id="playerMeta" style="margin:0; font-size: 22px;">Loading...</h2>

    <div id="tvControls" style="display:none; margin-top: 25px;">
        <select id="seasonSelect" style="width:100%; padding:14px; background:#1a1a1a; color:white; border:1px solid #333; border-radius:10px; font-weight:bold;" onchange="loadSeason()"></select>
        <div class="ep-grid" id="epGrid"></div>
    </div>
</div>

<script>
    const TMDB_KEY = 'c030ba389534870868d461b8a5812f62';
    const DB_KEY = 'STREAMPRO_ELITE_PRO_V3';
    
    let cur = { id: '', type: '', s: 1, e: 1, title: '', poster: '', srv: 'vidsrc' };

    window.onload = () => { fetchTrending(); renderHistory(); };

    function setServer(s) {
        cur.srv = s;
        document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(s === 'vidsrc' ? 'srv1' : 'srv2').classList.add('active');
        updateVideo();
    }

    function updateVideo() {
        const frame = document.getElementById('mainFrame');
        let url = "";
        
        // Server 2 (SuperEmbed) is known for being faster with fewer popups
        if (cur.srv === 'vidsrc') {
            url = `https://vidsrc.me/embed/${cur.type}/${cur.id}${cur.type === 'tv' ? `/${cur.s}/${cur.e}` : ''}`;
        } else {
            // New "Less Ads" Server 2 Logic
            url = `https://multiembed.mov/directstream.php?video_id=${cur.id}&tmdb=1${cur.type === 'tv' ? `&s=${cur.s}&e=${cur.e}` : ''}`;
        }
        
        frame.src = url;
        document.getElementById('playerMeta').innerText = `${cur.title} ${cur.type === 'tv' ? `• S${cur.s} E${cur.e}` : ''}`;
        saveProgress();
    }

    async function startApp(id, type, title, poster) {
        cur = { id, type, title, poster, s: 1, e: 1, srv: 'vidsrc' };
        const hist = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        if(hist[id]) { cur.s = hist[id].s; cur.e = hist[id].e; }

        showPage('playerPage');
        updateVideo();
        
        if(type === 'tv') {
            document.getElementById('tvControls').style.display = 'block';
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${TMDB_KEY}`).then(r => r.json());
            document.getElementById('seasonSelect').innerHTML = res.seasons.filter(s => s.season_number > 0)
                .map(s => `<option value="${s.season_number}" ${s.season_number == cur.s ? 'selected' : ''}>Season ${s.season_number}</option>`).join('');
            loadSeason(true);
        } else {
            document.getElementById('tvControls').style.display = 'none';
        }
    }

    async function loadSeason(init = false) {
        cur.s = document.getElementById('seasonSelect').value;
        const r = await fetch(`https://api.themoviedb.org/3/tv/${cur.id}/season/${cur.s}?api_key=${TMDB_KEY}`).then(res => res.json());
        const grid = document.getElementById('epGrid');
        grid.innerHTML = '';
        r.episodes.forEach(ep => {
            const div = document.createElement('div');
            div.className = `ep-node ${ep.episode_number == cur.e ? 'active' : ''}`;
            div.innerText = ep.episode_number;
            div.onclick = () => { cur.e = ep.episode_number; updateVideo(); loadSeason(true); };
            grid.appendChild(div);
        });
        if(!init) { cur.e = 1; updateVideo(); }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function fetchTrending() {
        fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${TMDB_KEY}`)
            .then(r => r.json()).then(d => renderGrid(d.results, 'trendingGrid'));
    }

    function filterGenre(id, el) {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        const url = id === 'all' 
            ? `https://api.themoviedb.org/3/trending/all/day?api_key=${TMDB_KEY}`
            : `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_KEY}&with_genres=${id}`;
        fetch(url).then(r => r.json()).then(d => renderGrid(d.results, 'trendingGrid'));
        showPage('home');
    }

    function renderGrid(data, target) {
        const g = document.getElementById(target); g.innerHTML = '';
        data.forEach(m => {
            if(!m.poster_path) return;
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster_path}" loading="lazy">`;
            card.onclick = () => startApp(m.id, m.media_type || (m.title ? 'movie' : 'tv'), m.title || m.name, m.poster_path);
            g.appendChild(card);
        });
    }

    function saveProgress() {
        const data = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        data[cur.id] = { ...cur, stamp: Date.now() };
        localStorage.setItem(DB_KEY, JSON.stringify(data));
    }

    function renderHistory() {
        const grid = document.getElementById('continueGrid');
        const data = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        const items = Object.values(data).sort((a,b) => b.stamp - a.stamp);
        grid.innerHTML = items.length ? '' : '<p style="opacity:0.5">Start watching to see your history!</p>';
        items.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster}">`;
            card.onclick = () => startApp(m.id, m.type, m.title, m.poster);
            grid.appendChild(card);
        });
    }

    async function handleSearch(q) {
        if(q.length < 2) return;
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${q}`).then(r => r.json());
        renderGrid(res.results.filter(i => i.poster_path), 'trendingGrid');
    }
</script>
</body>
</html>
