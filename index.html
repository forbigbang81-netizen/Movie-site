<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamPro Elite | Categories</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --accent: #e50914;
            --glass: rgba(15, 15, 15, 0.98);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        header {
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 12px 5%;
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border);
        }
        .nav-brand { font-size: 22px; font-weight: 900; color: var(--accent); cursor: pointer; }

        .search-area { position: relative; margin: 85px 5% 10px; }
        .search-input {
            width: 100%; background: #1a1a1a; border: 1px solid #333;
            color: #fff; padding: 15px 20px; border-radius: 14px;
            font-size: 16px; outline: none; box-sizing: border-box;
        }

        .search-dropdown {
            position: absolute; top: 60px; left: 0; right: 0;
            background: #121212; border: 1px solid #333;
            border-radius: 12px; z-index: 5000; max-height: 400px;
            overflow-y: auto; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        }
        .search-result {
            display: flex; align-items: center; gap: 15px; padding: 12px;
            border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .search-result img { width: 45px; height: 65px; border-radius: 6px; object-fit: cover; }

        /* Categories Bar */
        .category-bar {
            display: flex; gap: 10px; overflow-x: auto;
            padding: 10px 5%; margin-bottom: 10px;
            scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-pill {
            background: #1a1a1a; border: 1px solid #333;
            padding: 10px 22px; border-radius: 20px;
            white-space: nowrap; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .cat-pill.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3); }

        .content { padding: 0 5% 80px; }
        .section-title { font-size: 18px; font-weight: 800; margin: 15px 0; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: #1a1a1a; border-radius: 14px; overflow: hidden; aspect-ratio: 2/3; cursor: pointer; transition: 0.3s; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        .player-frame { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 18px; overflow: hidden; margin-bottom: 20px; border: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }

        .tv-controls { margin-top: 25px; }
        select { width: 100%; padding: 16px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 12px; font-weight: 800; }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; margin-top: 20px; }
        .ep-node { background: #1a1a1a; border: 1px solid #333; padding: 14px 0; text-align: center; border-radius: 10px; cursor: pointer; font-weight: 800; }
        .ep-node.active { background: var(--accent); border-color: var(--accent); }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="nav-brand" onclick="location.reload()">STREAMPRO</div>
    <div style="font-weight: 800; font-size: 14px; opacity: 0.7; cursor: pointer;" onclick="showPage('history')">HISTORY</div>
</header>

<div class="search-area">
    <input type="text" id="searchInput" class="search-input" placeholder="Search titles..." oninput="handleSearch(this.value)">
    <div id="searchDropdown" class="search-dropdown"></div>
</div>

<div class="category-bar">
    <div class="cat-pill active" onclick="filterCategory('trending', this)">Trending</div>
    <div class="cat-pill" onclick="filterCategory('16', this)">Anime</div>
    <div class="cat-pill" onclick="filterCategory('28', this)">Action</div>
    <div class="cat-pill" onclick="filterCategory('27', this)">Horror</div>
    <div class="cat-pill" onclick="filterCategory('878', this)">Sci-Fi</div>
    <div class="cat-pill" onclick="filterCategory('35', this)">Comedy</div>
</div>

<div class="content">
    <div id="home" class="page active">
        <div id="continueRow" style="display:none;">
            <div class="section-title">Continue Watching</div>
            <div id="contGrid" class="grid" style="grid-template-columns: repeat(2, 1fr); margin-bottom: 30px;"></div>
        </div>
        <div class="section-title" id="gridTitle">Popular Now</div>
        <div id="mainGrid" class="grid"></div>
    </div>

    <div id="history" class="page">
        <div class="section-title">Watch History</div>
        <div id="histGrid" class="grid"></div>
    </div>

    <div id="playerPage" class="page">
        <div class="player-frame"><iframe id="videoFrame" src="" allowfullscreen></iframe></div>
        <h2 id="mediaTitle" style="margin: 15px 0 5px; font-size: 22px;">Title</h2>
        <div id="tvUI" class="tv-controls" style="display:none;">
            <select id="seasonSelect" onchange="loadSeason()"></select>
            <div id="epGrid" class="ep-grid"></div>
        </div>
    </div>
</div>

<script>
    const KEY = 'c030ba389534870868d461b8a5812f62';
    const DB_NAME = 'STREAMPRO_CAT_V1';
    let cur = { id: '', type: '', s: 1, e: 1, title: '', poster: '' };

    window.onload = () => { fetchTrending(); refreshHistory(); };

    async function filterCategory(id, el) {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('gridTitle').innerText = el.innerText;
        showPage('home');
        
        const url = id === 'trending' 
            ? `https://api.themoviedb.org/3/trending/all/day?api_key=${KEY}`
            : `https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_genres=${id}`;
        
        const r = await fetch(url);
        const d = await r.json();
        renderGrid(d.results);
    }

    async function handleSearch(q) {
        const drop = document.getElementById('searchDropdown');
        if (q.length < 2) { drop.style.display = 'none'; return; }
        const r = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&query=${encodeURIComponent(q)}`);
        const d = await r.json();
        const res = d.results.filter(i => i.poster_path).slice(0, 7);
        if (res.length > 0) {
            drop.innerHTML = res.map(i => `
                <div class="search-result" onclick="setupMedia('${i.id}', '${i.media_type || (i.title ? 'movie' : 'tv')}', '${(i.title || i.name).replace(/'/g, "\\'")}', '${i.poster_path}')">
                    <img src="https://image.tmdb.org/t/p/w92${i.poster_path}">
                    <div class="result-info"><h4>${i.title || i.name}</h4><p>${(i.release_date || i.first_air_date || '').split('-')[0]}</p></div>
                </div>`).join('');
            drop.style.display = 'block';
        } else { drop.style.display = 'none'; }
    }

    async function setupMedia(id, type, title, poster) {
        document.getElementById('searchDropdown').style.display = 'none';
        cur = { id, type, title, poster, s: 1, e: 1 };
        const saved = JSON.parse(localStorage.getItem(DB_NAME)) || {};
        if(saved[id]) { cur.s = saved[id].s; cur.e = saved[id].e; }
        showPage('playerPage');
        play();
        if(type === 'tv') {
            document.getElementById('tvUI').style.display = 'block';
            const r = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${KEY}`).then(res => res.json());
            let seasons = r.seasons.filter(s => s.season_number > 0);
            if(id == '110309') seasons = seasons.slice(0, 3);
            document.getElementById('seasonSelect').innerHTML = seasons.map(s => 
                `<option value="${s.season_number}" ${s.season_number == cur.s ? 'selected' : ''}>Season ${s.season_number} ${id == '110309' && s.season_number == 3 ? '(Culling Game)' : ''}</option>`
            ).join('');
            loadSeason(true);
        } else { document.getElementById('tvUI').style.display = 'none'; }
    }

    function play() {
        const path = cur.type === 'tv' ? `${cur.id}/${cur.s}/${cur.e}` : cur.id;
        document.getElementById('videoFrame').src = `https://vidsrc.me/embed/${cur.type}/${path}`;
        document.getElementById('mediaTitle').innerText = `${cur.title} ${cur.type === 'tv' ? `(S${cur.s}:E${cur.e})` : ''}`;
        save();
    }

    async function loadSeason(init = false) {
        cur.s = document.getElementById('seasonSelect').value;
        const r = await fetch(`https://api.themoviedb.org/3/tv/${cur.id}/season/${cur.s}?api_key=${KEY}`).then(res => res.json());
        let episodes = r.episodes;
        if(cur.id == '110309') {
            if(cur.s == 1) episodes = episodes.slice(0, 24);
            if(cur.s == 2) episodes = episodes.slice(0, 23);
        }
        const g = document.getElementById('epGrid'); g.innerHTML = '';
        episodes.forEach(ep => {
            const n = document.createElement('div');
            n.className = `ep-node ${ep.episode_number == cur.e ? 'active' : ''}`;
            n.innerText = ep.episode_number;
            n.onclick = () => { cur.e = ep.episode_number; play(); loadSeason(true); };
            g.appendChild(n);
        });
        if(!init) { cur.e = 1; play(); }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function fetchTrending() {
        const r = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${KEY}`);
        const d = await r.json();
        renderGrid(d.results);
    }

    function renderGrid(data) {
        const g = document.getElementById('mainGrid'); g.innerHTML = '';
        data.forEach(m => {
            if(!m.poster_path) return;
            const c = document.createElement('div');
            c.className = 'card';
            c.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">`;
            c.onclick = () => setupMedia(m.id, m.media_type || (m.title ? 'movie' : 'tv'), m.title || m.name, m.poster_path);
            g.appendChild(c);
        });
    }

    function save() {
        const db = JSON.parse(localStorage.getItem(DB_NAME)) || {};
        db[cur.id] = { ...cur, ts: Date.now() };
        localStorage.setItem(DB_NAME, JSON.stringify(db));
        refreshHistory();
    }

    function refreshHistory() {
        const db = JSON.parse(localStorage.getItem(DB_NAME)) || {};
        const items = Object.values(db).sort((a,b) => b.ts - a.ts);
        if(items.length > 0) {
            document.getElementById('continueRow').style.display = 'block';
            const cg = document.getElementById('contGrid'); cg.innerHTML = '';
            items.slice(0, 2).forEach(m => cg.appendChild(createCard(m)));
        }
        const hg = document.getElementById('histGrid'); hg.innerHTML = '';
        items.forEach(m => hg.appendChild(createCard(m)));
    }

    function createCard(m) {
        const d = document.createElement('div'); d.className = 'card';
        d.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster}">`;
        d.onclick = () => setupMedia(m.id, m.type, m.title, m.poster);
        return d;
    }
</script>
</body>
</html>
