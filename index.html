<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamPro Elite</title>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #e50914; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Header Fixes */
        header { background: #000; padding: 15px 5%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nav-brand { font-weight: 900; font-size: 22px; color: var(--accent); letter-spacing: 1px; }
        
        #searchInput { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        .genre-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .genre-pill { white-space: nowrap; padding: 7px 15px; background: #222; border-radius: 20px; font-size: 13px; cursor: pointer; }

        /* Page Layout */
        .page { display: none; padding: 0 5%; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Player & Details - Forced Visibility */
        #playerPage { display: none; flex-direction: column; }
        #playerPage.active { display: flex; }
        
        #playerContainer { width: 100%; background: #000; aspect-ratio: 16/9; position: relative; }
        #mainFrame { width: 100%; height: 100%; border: none; background: #000; }

        .details-box { padding: 20px 5%; background: linear-gradient(to bottom, #111, #000); }
        #playerMeta { font-size: 20px; margin: 0; font-weight: bold; }
        #saveStatus { color: #44ff44; font-size: 13px; margin: 5px 0 15px; font-weight: 600; }

        /* Grid System */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-top: 10px; }
        .movie-card { background: var(--card); border-radius: 6px; position: relative; overflow: hidden; aspect-ratio: 2/3; cursor: pointer; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        
        .remove-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; z-index: 5; }
        .progress-tag { position: absolute; bottom: 0; width: 100%; background: var(--accent); font-size: 10px; padding: 4px 0; text-align: center; font-weight: 800; }

        /* Episodes */
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 8px; margin: 15px 0; }
        .ep-node { background: #222; padding: 12px 0; text-align: center; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .ep-node.active { background: var(--accent); font-weight: bold; }
        
        .section-label { font-size: 17px; font-weight: bold; margin: 25px 0 10px; border-left: 4px solid var(--accent); padding-left: 10px; }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <div class="nav-brand" onclick="location.reload()">STREAMPRO</div>
        <div style="display:flex; gap:20px; font-size: 15px; font-weight: 600;">
            <span onclick="showPage('home')">Home</span>
            <span onclick="showPage('dashboard')">History</span>
        </div>
    </div>
    <input type="text" id="searchInput" placeholder="Search..." oninput="handleSearch(this.value)">
    <div class="genre-row" id="genreBar"></div>
</header>

<div id="home" class="page active">
    <h2 id="homeTitle" style="font-size: 20px;">Trending Now</h2>
    <div id="trendingGrid" class="card-grid"></div>
</div>

<div id="dashboard" class="page">
    <h2 style="font-size: 20px;">Continue Watching</h2>
    <div id="continueGrid" class="card-grid"></div>
</div>

<div id="playerPage" class="page">
    <div id="playerContainer">
        <iframe id="mainFrame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="details-box">
        <h3 id="playerMeta">Loading...</h3>
        <div id="saveStatus">● Syncing Progress...</div>

        <div id="tvControls" style="display:none;">
            <select id="seasonSelect" style="width:100%; padding:12px; background:#222; color:#fff; border:1px solid #444; border-radius:6px;" onchange="loadSeason()"></select>
            <div class="ep-grid" id="epGrid"></div>
        </div>

        <div class="section-label">More Like This</div>
        <div id="similarGrid" class="card-grid"></div>
    </div>
</div>

<script>
    const API_KEY = 'c030ba389534870868d461b8a5812f62';
    const DB_KEY = 'STREAMPRO_v20_STABLE'; // Updated key for clean sync
    
    let cur = { id: '', type: '', s: 1, e: 1, title: '', poster: '' };

    window.onload = () => { renderDashboard(); fetchTrending(); };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'dashboard') renderDashboard();
    }

    async function startApp(id, type, title, poster) {
        // Reset and Show Page Immediately
        showPage('playerPage');
        window.scrollTo(0,0);
        
        cur = { id, type, title, poster, s: 1, e: 1 };
        
        // Load saved progress
        const hist = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        if(hist[id]) { 
            cur.s = hist[id].s || 1; 
            cur.e = hist[id].e || 1; 
        }

        // Instant UI Update
        document.getElementById('playerMeta').innerText = title + (type === 'tv' ? ` (S${cur.s}:E${cur.e})` : '');
        document.getElementById('mainFrame').src = ''; // Clear old video
        
        // Load Content
        if(type === 'tv') {
            document.getElementById('tvControls').style.display = 'block';
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`).then(r => r.json());
            document.getElementById('seasonSelect').innerHTML = res.seasons.filter(s => s.season_number > 0)
                .map(s => `<option value="${s.season_number}" ${s.season_number == cur.s ? 'selected' : ''}>Season ${s.season_number}</option>`).join('');
            loadSeason(true);
        } else {
            document.getElementById('tvControls').style.display = 'none';
            updateVideo();
        }
        
        fetchSimilar(id, type);
    }

    async function loadSeason(init = false) {
        cur.s = document.getElementById('seasonSelect').value;
        const r = await fetch(`https://api.themoviedb.org/3/tv/${cur.id}/season/${cur.s}?api_key=${API_KEY}`).then(res => res.json());
        const grid = document.getElementById('epGrid');
        grid.innerHTML = '';
        
        r.episodes.forEach(ep => {
            const div = document.createElement('div');
            div.className = `ep-node ${ep.episode_number == cur.e ? 'active' : ''}`;
            div.innerText = ep.episode_number;
            div.onclick = () => { 
                cur.e = ep.episode_number; 
                updateVideo(); 
                document.querySelectorAll('.ep-node').forEach(n => n.classList.remove('active'));
                div.classList.add('active');
            };
            grid.appendChild(div);
        });
        
        if(!init) cur.e = 1;
        updateVideo();
    }

    function updateVideo() {
        // Faster, cleaner Embed URL
        const embedBase = "https://vidsrc.xyz/embed/"; 
        const url = `${embedBase}${cur.type}/${cur.id}${cur.type === 'tv' ? `/${cur.s}-${cur.e}` : ''}`;
        
        document.getElementById('mainFrame').src = url;
        document.getElementById('playerMeta').innerText = cur.title + (cur.type === 'tv' ? ` - S${cur.s} E${cur.e}` : '');
        
        // Save Progress
        const hist = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        hist[cur.id] = { ...cur, stamp: Date.now() };
        localStorage.setItem(DB_KEY, JSON.stringify(hist));
        
        const status = document.getElementById('saveStatus');
        status.innerText = "✓ Progress Saved Automatically";
        status.style.color = "#44ff44";
    }

    async function fetchSimilar(id, type) {
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}/similar?api_key=${API_KEY}`).then(r => r.json());
        const grid = document.getElementById('similarGrid');
        grid.innerHTML = '';
        res.results.slice(0, 10).forEach(m => {
            const c = document.createElement('div');
            c.className = 'movie-card';
            c.onclick = () => startApp(m.id, type, m.title || m.name, m.poster_path);
            c.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">`;
            grid.appendChild(c);
        });
    }

    function renderDashboard() {
        const grid = document.getElementById('continueGrid');
        const data = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        const items = Object.values(data).sort((a,b) => b.stamp - a.stamp);
        grid.innerHTML = items.length ? '' : '<p style="color:#666; padding: 20px 0;">Your watch history will appear here.</p>';
        items.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => startApp(m.id, m.type, m.title, m.poster_path || m.poster);
            card.innerHTML = `
                <button class="remove-btn" onclick="event.stopPropagation(); removeHistory('${m.id}')">×</button>
                <img src="https://image.tmdb.org/t/p/w342${m.poster_path || m.poster}">
                <div class="progress-tag">${m.type==='tv' ? `S${m.s}:E${m.e}` : 'RESUME'}</div>`;
            grid.appendChild(card);
        });
    }

    function removeHistory(id) {
        const h = JSON.parse(localStorage.getItem(DB_KEY));
        delete h[id];
        localStorage.setItem(DB_KEY, JSON.stringify(h));
        renderDashboard();
    }

    // Genre Bar
    const GENRES = [{id: 16, name: "Anime"}, {id: 28, name: "Action"}, {id: 27, name: "Horror"}, {id: 878, name: "Sci-Fi"}];
    const genreBar = document.getElementById('genreBar');
    GENRES.forEach(g => {
        const span = document.createElement('span');
        span.className = 'genre-pill';
        span.innerText = g.name;
        span.onclick = () => loadGenre(g.id, g.name);
        genreBar.appendChild(span);
    });

    async function loadGenre(id, name) {
        document.getElementById('homeTitle').innerText = name;
        const type = id == 16 ? 'tv' : 'movie';
        const res = await fetch(`https://api.themoviedb.org/3/discover/${type}?api_key=${API_KEY}&with_genres=${id}`).then(r => r.json());
        renderGrid(res.results, type);
        showPage('home');
    }

    async function handleSearch(q) {
        if(q.length < 2) return;
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`).then(r => r.json());
        renderGrid(res.results.filter(i => i.media_type !== 'person'));
        showPage('home');
        document.getElementById('homeTitle').innerText = `Results for: ${q}`;
    }

    function fetchTrending() { 
        fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`).then(r=>r.json()).then(d=>renderGrid(d.results)); 
    }
    
    function renderGrid(res, type=null) {
        const g = document.getElementById('trendingGrid'); g.innerHTML = '';
        res.forEach(m => {
            if(!m.poster_path) return;
            const c = document.createElement('div');
            c.className = 'movie-card';
            c.onclick = () => startApp(m.id, type || m.media_type || 'movie', m.title || m.name, m.poster_path);
            c.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">`;
            g.appendChild(c);
        });
    }
</script>
</body>
</html>
