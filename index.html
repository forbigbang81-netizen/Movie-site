<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamPro Cinema</title>
    <style>
        :root { --bg: #000000; --card: #141414; --accent: #e50914; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        header { background: #000; padding: 10px 5%; display: flex; flex-direction: column; gap: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .nav-brand { font-weight: 900; font-size: 24px; color: var(--accent); cursor: pointer; }
        
        .search-container { position: relative; width: 100%; }
        #searchInput { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        
        #searchDropdown { 
            position: absolute; top: 100%; left: 0; width: 100%; 
            background: #111; border: 1px solid #333; max-height: 400px; 
            overflow-y: auto; display: none; z-index: 2000; border-radius: 0 0 6px 6px;
        }
        .dropdown-section-title { padding: 10px; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; background: #0a0a0a; }
        .search-item { padding: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #1a1a1a; }
        .search-item:hover { background: #222; }
        .search-item img { width: 40px; height: 60px; object-fit: cover; border-radius: 2px; }

        .genre-pill { display: inline-block; padding: 6px 12px; background: #222; border-radius: 20px; font-size: 12px; margin: 5px; cursor: pointer; transition: 0.2s; }
        .genre-pill:hover { background: var(--accent); }

        .nav-links { display: flex; gap: 15px; }
        .nav-link { color: #b3b3b3; cursor: pointer; font-size: 14px; font-weight: bold; }
        .nav-link.active { color: #fff; }

        .page { display: none; padding: 20px 5%; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-size: 18px; margin: 20px 0 15px 0; color: #fff; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .movie-card { width: 140px; height: 210px; background: var(--card); border-radius: 4px; position: relative; cursor: pointer; overflow: hidden; transition: 0.3s; }
        .movie-card:active { transform: scale(0.95); }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .progress-tag { position: absolute; bottom: 0; width: 100%; background: var(--accent); font-size: 10px; padding: 4px; text-align: center; font-weight: bold; }

        #playerContainer { width: 100%; max-width: 1000px; margin: 0 auto; background: #000; border-radius: 8px; overflow: hidden; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top:0; left:0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <div class="nav-brand" onclick="showPage('home')">STREAMPRO</div>
        <div class="nav-links">
            <span class="nav-link" id="l-home" onclick="showPage('home')">Home</span>
            <span class="nav-link" id="l-dash" onclick="showPage('dashboard')">History</span>
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search movies, shows, or genres..." oninput="handleSearch(this.value)" onfocus="handleSearch(this.value)">
        <div id="searchDropdown"></div>
    </div>
</header>

<div id="home" class="page active">
    <h2>Browse by Genre</h2>
    <div id="genreList" style="margin-bottom: 20px;"></div>
    
    <h2 id="homeTitle">Trending Now</h2>
    <div id="trendingGrid" class="card-grid"></div>
</div>

<div id="dashboard" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Continue Watching</h2>
        <button onclick="clearHistory()" style="background:#222; color:#fff; border:none; padding:5px 10px; border-radius:4px;">Clear</button>
    </div>
    <div id="continueGrid" class="card-grid"></div>
</div>

<div id="playerPage" class="page">
    <div id="playerContainer">
        <div class="video-wrapper">
            <iframe id="mainFrame" src="" allowfullscreen allow="autoplay; fullscreen; storage-access"></iframe>
        </div>
    </div>
    <div id="tvControls" style="display:none; margin-top: 20px;">
        <select id="seasonSelect" style="width:100%; padding:12px; background:#111; color:#fff; border:1px solid #333;" onchange="loadSeason()"></select>
        <div id="epGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; margin-top: 15px;"></div>
    </div>
</div>

<script>
    const API_KEY = 'c030ba389534870868d461b8a5812f62';
    const GENRES = [
        {id: 28, name: "Action"}, {id: 35, name: "Comedy"}, {id: 27, name: "Horror"}, 
        {id: 10749, name: "Romance"}, {id: 878, name: "Sci-Fi"}, {id: 18, name: "Drama"}
    ];
    let cur = { id: '', type: '', s: 1, e: 1, title: '', poster: '' };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'home') document.getElementById('l-home').classList.add('active');
        if(id === 'dashboard') { renderDashboard(); document.getElementById('l-dash').classList.add('active'); }
        document.getElementById('searchDropdown').style.display = 'none';
    }

    // Initialize Genres on Home
    const genreDiv = document.getElementById('genreList');
    GENRES.forEach(g => {
        const span = document.createElement('span');
        span.className = 'genre-pill';
        span.innerText = g.name;
        span.onclick = () => loadGenre(g.id, g.name);
        genreDiv.appendChild(span);
    });

    async function handleSearch(query) {
        const dropdown = document.getElementById('searchDropdown');
        dropdown.innerHTML = '';
        
        if (query.length < 1) {
            dropdown.style.display = 'block';
            dropdown.innerHTML = '<div class="dropdown-section-title">Popular Genres</div>';
            GENRES.forEach(g => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML = `<span>🔍 ${g.name}</span>`;
                div.onclick = () => { loadGenre(g.id, g.name); dropdown.style.display = 'none'; };
                dropdown.appendChild(div);
            });
            return;
        }

        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${query}`);
        const data = await res.json();
        
        if (data.results.length > 0) {
            dropdown.style.display = 'block';
            dropdown.innerHTML = '<div class="dropdown-section-title">Results</div>';
            data.results.slice(0, 6).forEach(item => {
                if (!item.poster_path) return;
                const div = document.createElement('div');
                div.className = 'search-item';
                div.onclick = () => { startApp(item.id, item.media_type || 'movie', item.title || item.name, item.poster_path); dropdown.style.display = 'none'; };
                div.innerHTML = `<img src="https://image.tmdb.org/t/p/w92${item.poster_path}"><span>${item.title || item.name}</span>`;
                dropdown.appendChild(div);
            });
        }
    }

    async function loadGenre(id, name) {
        document.getElementById('homeTitle').innerText = `${name} Movies`;
        const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`);
        const data = await res.json();
        renderGrid('trendingGrid', data.results);
        showPage('home');
    }

    function renderGrid(targetId, results) {
        const grid = document.getElementById(targetId);
        grid.innerHTML = '';
        results.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => startApp(m.id, m.media_type || 'movie', m.title || m.name, m.poster_path);
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">`;
            grid.appendChild(card);
        });
    }

    // Default Trending
    fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`).then(r => r.json()).then(d => renderGrid('trendingGrid', d.results));

    async function startApp(id, type, title, poster) {
        cur = { id, type, title, poster, s: 1, e: 1 };
        const hist = JSON.parse(localStorage.getItem('sp_final_v11')) || {};
        if(hist[id]) { cur.s = hist[id].s; cur.e = hist[id].e; }

        if(type === 'tv') {
            document.getElementById('tvControls').style.display = 'block';
            const r = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`).then(res => res.json());
            document.getElementById('seasonSelect').innerHTML = r.seasons.filter(s => s.season_number > 0)
                .map(s => `<option value="${s.season_number}" ${s.season_number == cur.s ? 'selected' : ''}>Season ${s.season_number}</option>`).join('');
            loadSeason(true);
        } else {
            document.getElementById('tvControls').style.display = 'none';
            updateFrame();
        }
        showPage('playerPage');
    }

    async function loadSeason(init = false) {
        cur.s = document.getElementById('seasonSelect').value;
        const r = await fetch(`https://api.themoviedb.org/3/tv/${cur.id}/season/${cur.s}?api_key=${API_KEY}`).then(res => res.json());
        document.getElementById('epGrid').innerHTML = r.episodes.map(ep => `
            <div style="background:#222; padding:10px; text-align:center; cursor:pointer;" onclick="cur.e=${ep.episode_number}; updateFrame();">${ep.episode_number}</div>
        `).join('');
        if(!init) cur.e = 1;
        updateFrame();
    }

    function updateFrame() {
        document.getElementById('mainFrame').src = `https://vidsrc.cc/v2/embed/${cur.type}/${cur.id}${cur.type==='tv' ? `/${cur.s}/${cur.e}` : ''}`;
        const hist = JSON.parse(localStorage.getItem('sp_final_v11')) || {};
        hist[cur.id] = { ...cur, stamp: Date.now() };
        localStorage.setItem('sp_final_v11', JSON.stringify(hist));
    }

    function renderDashboard() {
        const grid = document.getElementById('continueGrid');
        grid.innerHTML = '';
        const items = Object.values(JSON.parse(localStorage.getItem('sp_final_v11')) || {}).sort((a,b) => b.stamp - a.stamp);
        items.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => startApp(m.id, m.type, m.title, m.poster);
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${m.poster}"><div class="progress-tag">${m.type==='tv' ? `S${m.s}:E${m.e}` : 'RESUME'}</div>`;
            grid.appendChild(card);
        });
    }

    function clearHistory() { if(confirm("Clear history?")) { localStorage.removeItem('sp_final_v11'); renderDashboard(); } }
</script>
</body>
</html>
